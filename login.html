<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Paul Mendoza</title>
    <link href="https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css" rel="stylesheet">

    <style>
        * {
            box-sizing: border-box;
        }

        body {
            margin: 0;
            padding: 20px;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #1a1a1a, #3a3a3a);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .container {
            width: 100%;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 25px;
        }

        .login-box,
        .fams {
            width: 100%;
            max-width: 350px;
            background-color: #222;
            padding: 40px;
            border-radius: 12px;
            text-align: center;
        }

        .login-box {
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
        }

        .fams {
            background-color: #1f1f1f;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.15);
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-size: 28px;
            color: #00bcd4;
        }

        .fams h1 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #00bcd4;
        }

        .login-box form {
            display: flex;
            flex-direction: column;
        }

        .login-box input {
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-size: 16px;
        }

        .login-box button,
        .fams button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #00bcd4;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .login-box button:hover,
        .fams button:hover {
            background-color: #0097a7;
            transform: translateY(-2px);
        }

        .back-link {
            margin-top: 20px;
            display: inline-block;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #fff;
        }

        /* Tablet */
        @media (max-width: 768px) {
            .login-box h2 {
                font-size: 24px;
            }

            .fams h1 {
                font-size: 18px;
            }
        }

        /* Mobile */
        @media (max-width: 480px) {

            .login-box,
            .fams {
                padding: 25px 20px;
            }

            .login-box input,
            .login-box button,
            .fams button {
                font-size: 14px;
                padding: 10px;
            }

            .back-link {
                font-size: 13px;
            }
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="login-box">
            <h2><i class='bx bx-lock-alt'></i> Login</h2>
            <form id="loginForm">
                <input type="text" id="username" placeholder="Username" required>
                <input type="password" id="password" placeholder="Password" required>
                <button type="submit">Login</button>
            </form>

            <a href="index.html" class="back-link">
                <i class='bx bx-arrow-back'></i> Back to Home
            </a>
        </div>

        <div class="fams">
            <h1>Form Automation Management System (FAMS)</h1>
            <a
                href="https://www.mediafire.com/file/9f2r70iufdkop8x/fams_installer.exe/file">
                <button>
                    <i class='bx bx-download'></i> Download
                </button>
            </a>
        </div>

    </div>

    <script src="login.js"></script>
</body>

</html>
