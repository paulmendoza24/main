<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Login - Paul Mendoza</title>
    <link href='https://unpkg.com/boxicons@2.1.4/css/boxicons.min.css' rel='stylesheet'>
    <style>
        body {
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', sans-serif;
            background: linear-gradient(120deg, #1a1a1a, #3a3a3a);
            height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            color: #fff;
        }

        .login-box {
            background-color: #222;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 15px rgba(255, 255, 255, 0.1);
            width: 350px;
            text-align: center;
        }

        .login-box h2 {
            margin-bottom: 25px;
            font-size: 28px;
            color: #00bcd4;
        }

        .login-box form {
            display: flex;
            flex-direction: column;
        }

        .login-box input {
            padding: 12px;
            margin: 10px 0;
            border: none;
            border-radius: 6px;
            background-color: #333;
            color: #fff;
            font-size: 16px;
        }

        .login-box button {
            padding: 12px;
            border: none;
            border-radius: 6px;
            background-color: #00bcd4;
            color: #fff;
            font-size: 16px;
            cursor: pointer;
            transition: background 0.3s ease;
        }

        .login-box button:hover {
            background-color: #0097a7;
        }

        .back-link {
            margin-top: 20px;
            display: block;
            color: #ccc;
            text-decoration: none;
            font-size: 14px;
        }

        .back-link:hover {
            color: #fff;
        }

        .fams {
            background-color: #1f1f1f;
            padding: 30px;
            border-radius: 12px;
            width: 350px;
            text-align: center;
            box-shadow: 0 0 15px rgba(0, 188, 212, 0.15);
        }

        .fams h1 {
            font-size: 20px;
            margin-bottom: 15px;
            color: #00bcd4;
        }

        .fams button {
            padding: 12px 25px;
            border: none;
            border-radius: 6px;
            background-color: #00bcd4;
            color: #fff;
            font-size: 15px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .fams button:hover {
            background-color: #0097a7;
            transform: translateY(-2px);
        }

        .container {
            display: flex;

            align-items: center;
            gap: 25px;
        }
    </style>
</head>



<body>
    <div class="container">
        <div class="login-box">
            <h2><i class='bx bx-lock-alt'></i> Login</h2>
            <form id="loginForm">
                <input type="text" placeholder="Username" id="username" required />
                <input type="password" placeholder="Password" id="password" required />
                <button type="submit">Login</button>
            </form>
            <a href="index.html" class="back-link">
                <i class='bx bx-arrow-back'></i> Back to Home
            </a>
        </div>

        <div class="fams">
            <h1>Form Automation Management System (FAMS)</h1>

                href="https://download1979.mediafire.com/gaajcadkinogS8B7ypu6bwsS1E-c5bWw57fRsRHjUjTtCZjiYQh3MaFSHiz94X6zUHvWyxlPnryP9vYJTrCEKNJBeB-g8AOnOrDMCquzmxay7sSZNui8jNClE_9y4WYu8YTY7MO2uAEFdZpjTxZoNobEtPO0hEsz5uhQINIiYJlSPQ/9f2r70iufdkop8x/fams_installer.exe"><button>
                    <i class='bx bx-download'></i> Download
                </button>
            </a>
        </div>
    </div>

    <script src="login.js"></script>
</body>


</html>
